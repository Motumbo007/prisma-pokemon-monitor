name: Prisma Pokemon Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull latest state
        run: git pull --rebase
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python monitor.py
      - name: Save updated state
        run: |
          git config user.name "Pokemon Monitor Bot"
          git config user.email "bot@prisma-monitor"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update product state"
          git push
