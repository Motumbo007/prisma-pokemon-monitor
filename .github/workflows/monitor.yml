name: Prisma Pokemon Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # Runs every 30 minutes
  workflow_dispatch:           # Lets you trigger it manually too

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit state.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python monitor.py

      - name: Save updated state
        run: |
          git config user.name  "Pokemon Monitor Bot"
          git config user.email "bot@prisma-monitor"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update product state"
          git push
